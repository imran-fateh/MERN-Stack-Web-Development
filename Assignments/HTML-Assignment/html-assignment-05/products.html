<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EleectroMart Product Price List</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f4f4;
        padding: 40px;
    }

    .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #222;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        text-align: center;
    }

    thead {
        background: #222;
        color: white;
    }

    th,
    td {
        border: 1px solid #ccc;
        padding: 15px;
    }

    tbody tr:nth-child(even) {
        background: #f9f9f9;
    }

    tbody tr:hover {
        background: #e8f0ff;
    }

    tfoot {
        background: #222;
        color: white;
        font-weight: bold;
    }
</style>

<body>

    <div class="container">

        <!-- Main Heading  -->
        <h1>EleectroMart Product Price List</h1>

        <!-- Table for Product Price List  -->
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Samsung A14</td>
                    <td rowspan="2">Mobile</td>
                    <td>$999</td>
                    <td>Yes</td>
                </tr>
                <tr>
                    <td>iPhone 13 Pro</td>
                    <td>$899</td>
                    <td>No</td>
                </tr>
                <tr>
                    <td>Hp Laptop 15</td>
                    <td rowspan="2">Laptop</td>
                    <td>$1200</td>
                    <td>Yes</td>
                </tr>
                <tr>
                    <td>MacBook Pro</td>
                    <td>$1299</td>
                    <td>No</td>
                </tr>
            </tbody>

            <tfoot>
                <tr>
                    <td colspan="4">Total Products: 4</td>
                </tr>
            </tfoot>
        </table>
    </div>

</body>

</html>
