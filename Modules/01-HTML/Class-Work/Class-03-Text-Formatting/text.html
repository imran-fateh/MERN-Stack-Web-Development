<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting Tages</title>
</head>

<body>

    <!-- Main Heading -->
    <h1>Chapter 2: Text</h1>

    <!-- Sub Heading -->
    <h2>Text Formatting</h2>

    <!-- Introduction Paragraph -->
    <p>HTML provides several tags for formatting text.</p>

    <!-- List of Formatting Tags -->
    <ul>

        <!-- Bold Text -->
        <li><strong>Bold</strong></li>

        <!-- Italic Text -->
        <li><em>Italic</em></li>

        <!-- Bold and Italic -->
        <li><strong><em>Bold and Italic</em></strong></li>

        <!-- Small Text -->
        <li><small>Small</small></li>

        <!-- Deleted Text -->
        <li><del>Deleted Text</del></li>

    </ul>

    <!-- Superscript Example -->
    <p>x<sup>2</sup></p>

    <!-- Subscript Example -->
    <p>H<sub>2</sub>O</p>

    <!-- Line Break Example -->
    <br>

    <!-- Block Quote Example -->
    <blockquote>
        Learning never stops.
    </blockquote>

</body>

</html>
