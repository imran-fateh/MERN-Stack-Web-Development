<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Text Tags</title>
</head>

<body>

    <!-- Highlighted Text -->
    <mark>Highlighted Text</mark>

    <!-- Small Text -->
    <small>Small Text</small>

    <!-- Inserted Text -->
    <ins>Inserted Text</ins>

    <!-- Citation Tag -->
    <cite>HTML Book</cite>

    <!-- Definition Tag -->
    <dfn>HTML</dfn>

    <!-- Contact Information -->
    <address>
        City: Peshawar
    </address>

</body>

</html>
