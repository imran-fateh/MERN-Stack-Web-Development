<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists & Links</title>
</head>

<body>
    <!-- Unordered List -->
    <ul>
        <li>Apple</li>
        <li>Orange</li>
        <li>Banana</li>
    </ul>

    <!-- Ordered List -->
    <ol>
        <li>Banana</li>
        <li>Orange</li>
        <li>Apple</li>
    </ol>

    <!-- External Link -->
    <a href="https://www.google.com">
        Visit Google
    </a>


</body>

</html>
