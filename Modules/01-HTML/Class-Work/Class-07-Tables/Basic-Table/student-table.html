<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Table</title>
</head>

<body>

    <!-- Table Title -->
    <table border="1" width="50%">

        <caption>
            <h2>Student Table</h2>
        </caption>

        <!-- Table Header -->
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>

        <!-- Table Body -->
        <tbody>
            <tr>
                <td>1</td>
                <td>Kamal Khan</td>
                <td>20</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Wsail Khan</td>
                <td>21</td>
            </tr>

            <tr>
                <td>3</td>
                <td>Khushal Khan</td>
                <td>22</td>
            </tr>
        </tbody>

    </table>

</body>

</html>
