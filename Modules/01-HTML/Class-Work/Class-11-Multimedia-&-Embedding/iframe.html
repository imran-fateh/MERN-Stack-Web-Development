<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Multimedia</title>
</head>

<body>

    <!-- ========================= -->
    <!-- Image Example -->
    <!-- ========================= -->

    <h1>Image Example</h1>

    <img src="images/profile.jpg" alt="Profile Image" width="300">

    <hr>

    <!-- ========================= -->
    <!-- Iframe Example -->
    <!-- ========================= -->

    <h1>Iframe Example</h1>

    <iframe src="https://www.wikipedia.org" width="600" height="300" title="Wikipedia">
    </iframe>

    <hr>

    <!-- ========================= -->
    <!-- YouTube Video Embed -->
    <!-- ========================= -->

    <h1>YouTube Embed Example</h1>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/video-id" title="YouTube Video">
    </iframe>

    <hr>

    <!-- ========================= -->
    <!-- Video Example -->
    <!-- ========================= -->

    <h1>Video Example</h1>

    <video controls width="500">
        <source src="video.mp4">
    </video>

    <hr>

    <!-- ========================= -->
    <!-- Audio Example -->
    <!-- ========================= -->

    <h1>Audio Example</h1>

    <audio controls>
        <source src="audio.mp3">
    </audio>

    <hr>

    <!-- ========================= -->
    <!-- HTML Entities Example -->
    <!-- ========================= -->

    <h1>HTML Entities</h1>

    <p>&copy; Copyright</p>
    <p>&lt; HTML Tag &gt;</p>
    <p>&amp; Ampersand</p>

    <hr>

    <!-- ========================= -->
    <!-- Footer Example -->
    <!-- ========================= -->

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

</body>

</html>
