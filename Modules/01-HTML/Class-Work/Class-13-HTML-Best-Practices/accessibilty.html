<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessibility</title>
</head>

<body>

    <!-- Main Heading  -->

    <h1>Accessibility Example</h1>

    <!-- Text Input With Placeholder -->

    <input type="text" placeholder="Enter your name">

    <!-- Label Connected With Input -->

    <label for="email">Email</label>
    <input type="email" id="email">

    <hr>

    <!-- Image With Alt Text -->

    <img src="images/profile.jpg" alt="Student Profile Picture">

    <hr>

    <!-- Button With Text -->

    <button>Click Me</button>

    <hr>

    <!-- Link With Text -->

    <a href="#">Click Here</a>

    <hr>

    <!-- Table With Headers -->

    <table>
        <thead>
            <tr>
                <th>Header 1</th>
                <th>Header 2</th>
                <th>Header 3</th>
            </tr>
        </thead>

        <!-- Table Body -->
        <tbody>
            <tr>
                <td>Data 1</td>
                <td>Data 2</td>
                <td>Data 3</td>
            </tr>
        </tbody>

        <!-- Table Footer -->
        <tfoot>
            <tr>
                <td>Copyright 2026 All Rights Reserved. </td>
            </tr>
        </tfoot>
    </table>





</body>

</html>
