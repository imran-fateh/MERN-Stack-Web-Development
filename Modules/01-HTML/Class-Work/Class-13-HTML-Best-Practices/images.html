<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Images</title>
</head>

<body>

    <!-- Main Heading -->
    <h1>HTML Images</h1>

    <!-- Basic Image -->
    <img src="images/profile.jpg" alt="Profile Picture" width="300">

    <hr>

    <!-- Figure & Figcaption -->
    <figure>

        <img src="images/mountain.jpg" alt="Beautiful Mountain" width="400">

        <figcaption>
            Beautiful Mountain View
        </figcaption>

    </figure>

</body>

</html>
