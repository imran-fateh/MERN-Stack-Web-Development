<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Paths</title>
</head>

<body>

    <h1>Relative & Absolute Paths</h1>

    <!-- Relative Path -->

    <img src="images/profile.jpg" alt="Relative Path Image">

    <hr>

    <!-- Parent Folder Path -->

    <img src="../images/profile.jpg" alt="Parent Folder Image">

</body>

</html>
