<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting Practice</title>
</head>

<body>

    <!-- Main Heading -->
    <h1>HTML Text Formatting Tags</h1>

    <!-- Bold Text -->
    <p>
        <b>Bold Text using b tag</b>
    </p>

    <!-- Strong Text -->
    <p>
        <strong>Important Text using strong tag</strong>
    </p>

    <!-- Italic Text -->
    <p>
        <i>Italic Text using i tag</i>
    </p>

    <!-- Emphasized Text -->
    <p>
        <em>Emphasized Text using em tag</em>
    </p>

    <!-- Marked Text -->
    <p>
        Learn <mark>HTML</mark> before CSS.
    </p>

    <!-- Small Text -->
    <p>
        <small>This is small text.</small>
    </p>

    <!-- Deleted Text -->
    <p>
        Price: <del>5000 PKR</del>
    </p>

    <!-- Inserted Text -->
    <p>
        Updated Price: <ins>3000 PKR</ins>
    </p>

    <!-- Subscript -->
    <p>
        H<sub>2</sub>O
    </p>

    <!-- Superscript -->
    <p>
        x<sup>2</sup>
    </p>

</body>

</html>
