<!DOCTYPE html>
<html lang="en">

<head><!-- Character Encoding -->
    <meta charset="UTF-8">
    <!-- Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

</head>

<body>


    <!-- PAGE HEADING -->

    <header>

        <h1>Student Registration Form</h1>

        <p>
            Complete the form below to register
            for the Web Development Course.
        </p>

        <hr>

    </header>


    <!-- MAIN CONTENT -->

    <main>

        <!-- Registration Form -->

        <form>

            <!-- Full Name -->

            <label for="name">
                Full Name:
            </label>

            <br>

            <input type="text" id="name" placeholder="Enter your full name" required>

            <br><br>

            <!-- Email -->

            <label for="email">
                Email Address:
            </label>

            <br>

            <input type="email" id="email" placeholder="Enter your email" required>

            <br><br>

            <!-- Password -->

            <label for="password">
                Password:
            </label>

            <br>

            <input type="password" id="password" placeholder="Create password" required>

            <br><br>

            <!-- Date Of Birth -->

            <label for="dob">
                Date Of Birth:
            </label>

            <br>

            <input type="date" id="dob">

            <br><br>

            <!-- Gender -->

            <label>
                Gender:
            </label>

            <br>

            <input type="radio" id="male" name="gender">

            <label for="male">
                Male
            </label>

            <input type="radio" id="female" name="gender">

            <label for="female">
                Female
            </label>

            <br><br>

            <!-- Course Selection -->

            <label for="course">
                Select Course:
            </label>

            <br>

            <select id="course">

                <option>HTML</option>
                <option>CSS</option>
                <option>JavaScript</option>
                <option>React JS</option>

            </select>

            <br><br>

            <!-- Address -->

            <label for="address">
                Address:
            </label>

            <br>

            <textarea id="address" rows="5" cols="35" placeholder="Enter your address">
            </textarea>

            <br><br>

            <!-- Buttons -->

            <button type="submit">
                Register Now
            </button>

            <button type="reset">
                Reset Form
            </button>

        </form>

    </main>

    <hr>

    <!-- FOOTER -->
    <footer>

        <p>
            © 2026 Student Registration Form
        </p>

    </footer>

</body>

</html>
