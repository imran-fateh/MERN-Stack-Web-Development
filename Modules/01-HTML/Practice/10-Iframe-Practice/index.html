<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">
    <!-- Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Practice</title>
</head>

<body>

    <!-- ===================================== -->
    <!-- PAGE HEADING -->
    <!-- ===================================== -->

    <h1>HTML Iframe Practice</h1>

    <p>
        Learn how to embed external content
        inside a webpage using iframe.
    </p>

    <hr>

    <!-- ===================================== -->
    <!-- WEBSITE EMBED -->
    <!-- ===================================== -->

    <h2>Wikipedia Website</h2>

    <iframe src="https://www.wikipedia.org" width="560" height="300" title="Wikipedia">
    </iframe>

    <hr>

    <!-- ===================================== -->
    <!-- YOUTUBE EMBED -->
    <!-- ===================================== -->

    <h2>YouTube Video</h2>

    <iframe width="560" height="300" src="https://www.youtube.com/embed/HcOc7P5BMi4?si=zr2rwW6t5DkxDvQA"
        title="HTML Tutorial">
    </iframe>


    <!-- ===================================== -->
    <!-- Google Maps -->
    <!-- ===================================== -->

    <h2>Google Maps</h2>

    <iframe src="https://maps.google.com/maps?q=pashwere&t=&z=13&ie=UTF8&iwloc=&output=embed" width="560" height="300"
        title="Google Maps">
    </iframe>



</body>

</html>
