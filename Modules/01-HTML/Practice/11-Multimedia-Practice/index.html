<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">
    <!-- Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Practice</title>

</head>

<body>

    <!-- PAGE HEADING -->

    <h1>HTML Multimedia Practice</h1>

    <hr>


    <!-- IMAGE EXAMPLE -->

    <h2>Image Example</h2>

    <img src="images/portfolio-image.jpeg" alt="Profile Picture" width="350" height="300">

    <hr>

    <!-- FIGURE & FIGCAPTION -->

    <figure>

        <img src="images/mountain-image.jpeg" alt="Mountain View" width="400">

        <figcaption>
            Beautiful Mountain Landscape
        </figcaption>

    </figure>

    <hr>

    <!-- AUDIO EXAMPLE -->

    <h2>Audio Example</h2>

    <audio controls>

        <source src="media/audio-sound.mp3" type="audio/mpeg">

    </audio>

    <hr>

    <!-- VIDEO EXAMPLE -->

    <h2>Video Example</h2>

    <video controls width="500">

        <source src="media/Flower-video.jpg.mp4" type="video/mp4">

    </video>

</body>

</html>
