<!doctype html>
<html lang="en">

<head>
  <!-- Character Encoding -->
  <meta charset="UTF-8" />

  <!-- Responsive Design -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Inline And Internal CSS Practice</title>
</head>

<!-- Internal CSS -->

<style>
  h2 {
    color: rgb(50, 50, 53);
    font-size: 30px;
    font-weight: 500;
  }

  .para {
    color: rgb(134, 134, 223);
    font-size: 20px;
    font-weight: 500;
    border: 2px solid rgb(78, 76, 76);
  }
</style>

<body>

  <!-- Inline CSS Practice -->

  <h1>Inline CSS Practice</h1>

  <p style="
        color: red;
        font-size: 20px;
        font-weight: 400;
        border: 2px solid black;
      ">
    Inline CSS is useful for applying quick styles directly to an HTML element
    using the style attribute.
  </p>


  <!-- Internal CSS Practice -->

  <h2>Internal CSS Practice</h2>

  <p class="para">
    Internal CSS is written inside the style tag and allows us to style
    multiple elements within the same web page efficiently.
  </p>
</body>

</html>
