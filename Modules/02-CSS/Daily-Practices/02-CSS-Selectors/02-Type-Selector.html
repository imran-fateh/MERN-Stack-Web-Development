<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Type Selector</title>

    <style>
        /* Type Selector */

        h1 {
            color: darkblue;
        }

        h2 {
            color: green;
        }

        p {
            color: brown;
            background-color: yellow;
        }

        ul {
            background-color: lightyellow;
        }

        li {
            color: rgb(223, 13, 13);
        }

        a {
            color: rgb(74, 71, 71);
            font-size: 20px;
            font-weight: 600;
        }

        table {
            border: 2px solid black;
            background-color: lightblue;
        }

        th {
            color: white;
            background-color: black;
        }

        td {
            color: blue;
        }

        input {
            border: 2px solid green;
            background-color: lightblue;
        }

        button {
            background-color: black;
            color: white;
        }
    </style>
</head>

<body>
    <h1>Type Selector Practice</h1>

    <h2>HTML Topics</h2>

    <p>Type Selector selects all elements of the same tag.</p>

    <hr />

    <!-- Lists -->

    <h2>HTML List</h2>

    <ul>
        <li>HTML</li>

        <li>CSS</li>

        <li>JavaScript</li>
    </ul>

    <hr />

    <!-- Links -->

    <h2>Navigation Links</h2>

    <a href="#"> Home </a>

    <br /><br />

    <a href="#"> About </a>

    <br /><br />

    <a href="#"> Contact </a>

    <hr />

    <!-- Table -->

    <h2>Student Table</h2>

    <table border="1">
        <tr>
            <th>Name</th>

            <th>Course</th>
        </tr>

        <tr>
            <td>Imran</td>

            <td>MERN Stack</td>
        </tr>

        <tr>
            <td>Ali</td>

            <td>Web Development</td>
        </tr>
    </table>

    <hr />

    <!-- Form -->

    <h2>Registration Form</h2>

    <form>
        <label> Full Name: </label>

        <br /><br />

        <input type="text" placeholder="Enter Name" required />

        <br /><br />

        <label> Email: </label>

        <br /><br />

        <input type="email" placeholder="Enter Email" required />

        <br /><br />
        <label>Password:</label>
        <br /><br />

        <input type="password" placeholder="Enter Password" required />

        <br /><br />

        <button>Submit</button>
    </form>
</body>

</html>
