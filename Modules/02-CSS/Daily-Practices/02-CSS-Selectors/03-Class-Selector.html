<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Class Selector</title>

    <style>
        /* Class Selector */

        .heading {
            color: rgb(217, 38, 14);
        }

        .text {
            color: green;
        }

        .highlight {
            background-color: lightblue;

        }

        .btn {
            background-color: navy;
            color: white;
        }

        .card {
            background-color: lightgray;
            border: 2px solid black;
            padding: 15px;
            margin: 15px 0;
        }
    </style>
</head>

<body>
    <h1 class="heading">Class Selector Practice</h1>

    <p class="text">This paragraph uses the text class.</p>

    <p class="text highlight">
        This paragraph uses two classes: text and highlight.
    </p>

    <hr />

    <!-- Card Example -->

    <div class="card">
        <h2 class="heading">HTML</h2>

        <p class="text">HTML is used to create the structure of web pages.</p>
    </div>

    <div class="card">
        <h2 class="heading">CSS</h2>

        <p class="text">CSS is used to style web pages.</p>
    </div>

    <div class="card">
        <h2 class="heading">JavaScript</h2>

        <p class="text">JavaScript is used to add interactivity.</p>
    </div>

    <hr />

    <!-- Buttons -->

    <button class="btn">Login</button>

    <button class="btn">Register</button>

    <button class="btn">Contact</button>

    <hr />

    <!-- List Example -->

    <ul>
        <li class="highlight">HTML</li>

        <li>CSS</li>

        <li class="highlight">JavaScript</li>
    </ul>
</body>

</html>
